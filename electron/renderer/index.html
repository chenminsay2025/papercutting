<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CutPPaper 控制</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <div class="logo">CP</div>
          <div>
            <h1>CutPPaper</h1>
            <p class="subtitle">放纸 → 开始 → 自动流程</p>
          </div>
        </div>
        <div class="status-badges">
          <span id="pythonStatus" class="badge badge-off">Python</span>
          <span id="modeStatus" class="badge badge-sim">模拟</span>
          <span id="serialStatus" class="badge badge-off">未连接</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel workflow-panel">
          <div class="manual-card">
            <span class="manual-step">1</span>
            <span><strong>手动放纸</strong>，到位后点开始</span>
          </div>

          <div class="step-editor-header">
            <span class="step-editor-title">执行步骤</span>
            <span class="step-editor-hint">勾选启用 · 可插入/删除 · 支持等待</span>
          </div>
          <div class="step-editor" id="stepEditor"></div>

          <div class="hero-status">
            <div class="hero-row">
              <div id="phaseLabel" class="hero-title">空闲</div>
              <div class="hero-meta">
                <span id="progressText">0/0ms</span>
                <span id="cycleHint">~0s</span>
              </div>
            </div>
            <div class="progress-bar"><div id="progressFill"></div></div>
          </div>

          <div class="action-row">
            <button id="startBtn" type="button" class="btn btn-primary btn-large">开始本轮</button>
            <button id="estopBtn" type="button" class="btn btn-danger btn-compact">急停</button>
          </div>
          <div class="loop-row">
            <label class="toggle-row"><input id="autoLoop" type="checkbox" /><span>自动循环</span></label>
            <label class="loop-interval">轮间间隔 (ms)<input id="loopIntervalMs" type="number" min="0" step="500" value="3000" title="每轮完成后等待多久再开始下一轮；0 表示立即开始" /></label>
          </div>

          <div class="test-section">
            <div class="test-hint">步骤右侧「测」按钮可单步测试；时序在右侧配置。</div>
          </div>
        </section>

        <aside class="sidebar">
          <section class="panel panel-compact">
            <div class="inline-toggles">
              <label class="toggle-row"><input id="simulationMode" type="checkbox" checked /><span>模拟硬件</span></label>
              <label class="toggle-row"><input id="simulateCut" type="checkbox" checked /><span>跳过CM4</span></label>
            </div>
            <div class="serial-block" id="serialPanel">
              <label class="serial-field serial-port">
                串口
                <select id="portSelect" title="串口"></select>
              </label>
              <div class="serial-actions">
                <label class="serial-field">
                  波特率
                  <input id="baudrate" type="number" min="9600" step="100" title="波特率" />
                </label>
                <label class="serial-field">
                  超时 (ms)
                  <input id="timeoutMs" type="number" min="500" step="100" title="超时 ms" />
                </label>
                <div class="serial-btns">
                  <button id="refreshPortsBtn" type="button" class="btn btn-secondary btn-xs">刷新</button>
                  <button id="connectBtn" type="button" class="btn btn-primary btn-xs">连接</button>
                  <button id="disconnectBtn" type="button" class="btn btn-secondary btn-xs">断开</button>
                </div>
              </div>
            </div>
          </section>

          <details class="panel panel-compact" open>
            <summary>时序 (ms)</summary>
            <div class="field-grid">
              <label>缩回<input id="retractMs" type="number" min="0" step="100" /></label>
              <label>伸出<input id="extendMs" type="number" min="0" step="100" /></label>
              <label>切割<input id="cutWaitMs" type="number" min="0" step="100" /></label>
              <label>脉冲<input id="relayPulseMs" type="number" min="50" step="10" /></label>
              <label class="full">窗口关键字<input id="windowKeyword" type="text" placeholder="标题包含此文字即可" title="切割软件窗口标题中的任意片段" /></label>
              <label>发送热键<input id="sendHotkey" type="text" placeholder="ctrl+p" title="激活窗口后发送的快捷键" /></label>
              <label class="full cut-timing-hint">切割热键时序（激活 → 获焦 → 按热键 → 回本项目）</label>
              <label>焦点超时 (ms)<input id="beforeSendMs" type="number" min="0" step="100" title="① 激活目标窗口后，最多等待多久以获得焦点。不必等满，获焦即进入下一步；超时仍无焦点则报错。" /></label>
              <label>获焦后延迟 (ms)<input id="afterFocusMs" type="number" min="0" step="50" title="② 已获得焦点后、按下热键前的固定等待。给切割软件反应时间。" /></label>
              <label>热键后延迟 (ms)<input id="afterHotkeyMs" type="number" min="0" step="50" title="③ 热键发送完成后、切回本程序前的固定等待。给切割软件处理命令的时间。" /></label>
              <div class="cut-test-row">
                <button id="testWindowBtn" type="button" class="btn btn-secondary btn-xs">测试窗口</button>
                <button id="testHotkeyBtn" type="button" class="btn btn-secondary btn-xs">测试热键</button>
              </div>
            </div>
            <button id="saveConfigBtn" type="button" class="btn btn-secondary btn-xs full-width">保存</button>
          </details>

          <section class="panel panel-compact log-panel">
            <div class="log-header">
              <span>日志</span>
              <button id="clearLogBtn" type="button" class="btn btn-ghost btn-xs">清空</button>
            </div>
            <pre id="logView"></pre>
          </section>
        </aside>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
